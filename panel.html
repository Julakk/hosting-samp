<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Status Multi Server - Ahmad Store</title>

<style>
:root{
  --p:#ff2d9a;
  --u:#8b5cff;
  --g:#00ff88;
  --r:#ff3b3b;
}

body{
  margin:0;
  background:#05050a;
  color:#fff;
  font-family:sans-serif;
}

.header{
  text-align:center;
  padding:40px 20px;
}

.header span{
  background:linear-gradient(90deg,var(--p),var(--u));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.total{
  text-align:center;
  margin-top:-20px;
  color:#aaa;
}

.grid{
  max-width:1100px;
  margin:auto;
  display:grid;
  grid-template-columns:1fr;
  gap:20px;
  padding:20px;
}

.card{
  background:#0b0b0f;
  padding:20px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.08);
}

.status{
  display:flex;
  justify-content:space-between;
}

.badge{
  padding:5px 10px;
  border-radius:999px;
  font-size:12px;
}

.online{ background:rgba(0,255,136,.1); color:var(--g); }
.offline{ background:rgba(255,59,59,.1); color:var(--r); }

.info{
  font-size:13px;
  color:#aaa;
  margin-top:8px;
}

.bar{
  margin-top:10px;
  height:6px;
  background:#111;
  border-radius:10px;
  overflow:hidden;
}

.fill{
  height:100%;
  background:linear-gradient(90deg,var(--p),var(--u));
  width:0%;
  transition:.5s;
}

@media(min-width:800px){
  .grid{
    grid-template-columns:repeat(2,1fr);
  }
}
</style>
</head>

<body>

<div class="header">
  <h1>Status <span>Multi Server</span></h1>
</div>

<div class="total" id="totalPlayers">Total Players: -</div>

<div class="grid" id="serverList"></div>

<script>

/* ================= CONFIG ================= */
const API_URL = "http://207.180.19.77:3000/api/servers"; // GANTI

/* ================= RENDER ================= */
function render(data){
  const container = document.getElementById("serverList");
  const total = document.getElementById("totalPlayers");

  container.innerHTML = "";

  total.innerText = "Total Players: " + data.totalPlayers;

  data.servers.forEach((srv, i)=>{
    let percent = 0;

    if(srv.online && srv.maxplayers > 0){
      percent = (srv.players / srv.maxplayers) * 100;
    }

    container.innerHTML += `
      <div class="card">
        <div class="status">
          <h3>${srv.name}</h3>
          <div class="badge ${srv.online ? "online" : "offline"}">
            ${srv.online ? "ONLINE" : "OFFLINE"}
          </div>
        </div>

        <div class="info">
          ${srv.online ? 
            `Players: ${srv.players} / ${srv.maxplayers}` : 
            "Server tidak merespon"}
        </div>

        <div class="info">
          Mode: ${srv.online ? srv.gamemode : "-"}
        </div>

        <div class="info">
          Map: ${srv.online ? srv.map : "-"}
        </div>

        <div class="info">
          Ping: ${srv.online ? srv.ping + " ms" : "-"}
        </div>

        <div class="bar">
          <div class="fill" style="width:${percent}%"></div>
        </div>
      </div>
    `;
  });
}

/* ================= FETCH ================= */
async function load(){
  try{
    let res = await fetch(API_URL);
    let data = await res.json();
    render(data);
  }catch{
    document.getElementById("totalPlayers").innerText = "API Error";
  }
}

/* ================= LOOP ================= */
load();
setInterval(load, 5000);

</script>

</body>
</html>
