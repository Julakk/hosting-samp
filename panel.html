<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Preview</title>

<script>
(function(){

// =======================
// BLOKIR SHORTCUT
// =======================
document.addEventListener("keydown",function(e){

let key = e.key.toUpperCase();

if(
key === "F12" ||
(e.ctrlKey && e.shiftKey && ["I","J","C","K"].includes(key)) ||
(e.ctrlKey && ["U","S","P"].includes(key))
){
e.preventDefault();
return false;
}

});

// =======================
// BLOKIR KLIK KANAN
// =======================
document.addEventListener("contextmenu",function(e){
e.preventDefault();
});

// =======================
// BLOKIR COPY / SELECT
// =======================
["copy","cut","paste","selectstart","dragstart"].forEach(function(evt){
document.addEventListener(evt,function(e){
e.preventDefault();
});
});

// =======================
// CSS PROTECTION
// =======================
let style = document.createElement("style");

style.innerHTML = `
*{
user-select:none !important;
-webkit-user-select:none !important;
}

img{
pointer-events:none !important;
-webkit-user-drag:none !important;
}
`;

document.head.appendChild(style);

// =======================
// MATIKAN CONSOLE
// =======================
(function(){
let noop=function(){};
["log","warn","error","info","debug","table","trace","clear"]
.forEach(function(m){
console[m]=noop;
});
})();

// =======================
// DETEKSI DEVTOOLS
// =======================
let devtoolsOpen=false;

function detectDevTools(){

let width=window.outerWidth-window.innerWidth;
let height=window.outerHeight-window.innerHeight;

if(width>160 || height>160){

if(!devtoolsOpen){

devtoolsOpen=true;

// blur halaman
document.body.style.filter="blur(8px)";

// overlay
let overlay=document.createElement("div");
overlay.id="devtools-block";

overlay.style=`
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
color:#fff;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:999999;
font-family:sans-serif;
text-align:center;
padding:40px
`;

overlay.innerHTML=`
<div style="font-size:60px"></div>
<h2 style="color:#ff4444;margin:10px 0">Akses Ditolak</h2>
<p style="opacity:.8">Developer Tools terdeteksi.<br>Tutup DevTools untuk melanjutkan.</p>
`;

document.body.appendChild(overlay);

// redirect otomatis
setTimeout(function(){
location.href="https://google.com";
},5000);

}

}else{

devtoolsOpen=false;

document.body.style.filter="";

let overlay=document.getElementById("devtools-block");
if(overlay) overlay.remove();

}

}

setInterval(detectDevTools,500);

// =======================
// DEBUGGER LOOP
// =======================
setInterval(function(){
debugger;
},100);

})();
</script>

<style>
body{
  margin:0;
  background:#05050a;
  color:#fff;
  font-family:system-ui,Segoe UI;
}

/* PANEL SECTION */
.panel-preview{
 padding:100px 20px;
 text-align:center;
}

.panel-preview h2{
 font-size:28px;
 background:linear-gradient(90deg,#ff2d9a,#8b5cff);
 -webkit-background-clip:text;
 -webkit-text-fill-color:transparent;
}

.panel-preview p{
 color:#aaa;
 margin-bottom:40px;
}

/* SLIDER */
.panel-slider{
 max-width:900px;
 margin:auto;
 position:relative;
}

.panel-slide{
 display:none;
 animation:fade .6s;
}

.panel-slide.active{
 display:block;
}

@keyframes fade{
 from{opacity:0;transform:scale(.95)}
 to{opacity:1;transform:none}
}

/* MOCKUP */
.panel-mockup{
 display:flex;
 justify-content:center;
 gap:20px;
 position:relative;
}

.laptop{
 width:500px;
 background:#0b0b0f;
 padding:12px;
 border-radius:14px;
}

.laptop img{
 width:100%;
 border-radius:10px;
}

.phone{
 width:130px;
 position:absolute;
 right:10%;
 bottom:-20px;
 background:#000;
 padding:6px;
 border-radius:16px;
}

.phone img{
 width:100%;
 border-radius:10px;
}

/* TEXT */
.panel-slide h3{
 margin-top:12px;
}

.panel-slide span{
 color:#aaa;
 font-size:14px;
}

/* DOTS */
.panel-dots{
 margin-top:20px;
 display:flex;
 justify-content:center;
 gap:10px;
}

.panel-dots span{
 width:10px;
 height:10px;
 border-radius:50%;
 background:#444;
 cursor:pointer;
}

.panel-dots span.active{
 background:#ff2d9a;
}

/* BACK BUTTON */
.back-btn{
 display:inline-block;
 margin-top:50px;
 padding:12px 26px;
 border-radius:30px;
 background:linear-gradient(90deg,var(--p),var(--u));
 color:#fff;
 text-decoration:none;
 box-shadow:var(--glow);
 transition:.3s;
}

.back-btn:hover{
 opacity:.85;
 transform:translateY(-2px);
}
</style>
</head>

<body>

<section class="panel-preview">
  <h2>Panel Hosting Modern</h2>
  <p>Kelola server dengan mudah melalui panel modern</p>

  <div class="panel-slider">

    <!-- SLIDE 1 -->
    <div class="panel-slide active">
      <div class="panel-mockup">
        <div class="laptop">
          <img src="panel2.jpg" alt="Panel Control">
        </div>
        <div class="phone">
          <img src="panel2.jpg" alt="Panel Mobile">
        </div>
      </div>
      <h3>Server Control</h3>
      <span>Start • Stop • Restart 1 klik</span>
    </div>

    <!-- SLIDE 2 -->
    <div class="panel-slide">
      <div class="panel-mockup">
        <div class="laptop">
          <img src="panel3.jpg" alt="Panel File Manager">
        </div>
        <div class="phone">
          <img src="panel3.jpg" alt="Panel Mobile">
        </div>
      </div>
      <h3>File Manager</h3>
      <span>Edit & upload langsung dari panel</span>
    </div>

  </div>

  <!-- DOTS -->
  <div class="panel-dots"></div>
</section>

<a href="index.html" class="back-btn">← Kembali</a>

<script>
const slides = document.querySelectorAll(".panel-slide");
const dotsWrap = document.querySelector(".panel-dots");
let index = 0;

slides.forEach((_, i) => {
  const dot = document.createElement("span");
  if(i === 0) dot.classList.add("active");

  dot.onclick = () => showSlide(i);

  dotsWrap.appendChild(dot);
});

const dots = dotsWrap.querySelectorAll("span");

function showSlide(i){
  slides[index].classList.remove("active");
  dots[index].classList.remove("active");

  index = i;

  slides[index].classList.add("active");
  dots[index].classList.add("active");
}

setInterval(() => {
  let next = (index + 1) % slides.length;
  showSlide(next);
}, 4000);
</script>

</body>
</html>
