<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Testimoni | Ahmad Store</title>
<meta name="description" content="Testimoni pelanggan Ahmad Store – Hosting, Bot Discord, VPS terpercaya">

<script>
(function(){

// =======================
// BLOKIR SHORTCUT
// =======================
document.addEventListener("keydown",function(e){

let key = e.key.toUpperCase();

if(
key === "F12" ||
(e.ctrlKey && e.shiftKey && ["I","J","C","K"].includes(key)) ||
(e.ctrlKey && ["U","S","P"].includes(key))
){
e.preventDefault();
return false;
}

});

// =======================
// BLOKIR KLIK KANAN
// =======================
document.addEventListener("contextmenu",function(e){
e.preventDefault();
});

// =======================
// BLOKIR COPY / SELECT
// =======================
["copy","cut","paste","selectstart","dragstart"].forEach(function(evt){
document.addEventListener(evt,function(e){
e.preventDefault();
});
});

// =======================
// CSS PROTECTION
// =======================
let style = document.createElement("style");

style.innerHTML = `
*{
user-select:none !important;
-webkit-user-select:none !important;
}

img{
pointer-events:none !important;
-webkit-user-drag:none !important;
}
`;

document.head.appendChild(style);

// =======================
// MATIKAN CONSOLE
// =======================
(function(){
let noop=function(){};
["log","warn","error","info","debug","table","trace","clear"]
.forEach(function(m){
console[m]=noop;
});
})();

// =======================
// DETEKSI DEVTOOLS
// =======================
let devtoolsOpen=false;

function detectDevTools(){

let width=window.outerWidth-window.innerWidth;
let height=window.outerHeight-window.innerHeight;

if(width>160 || height>160){

if(!devtoolsOpen){

devtoolsOpen=true;

// blur halaman
document.body.style.filter="blur(8px)";

// overlay
let overlay=document.createElement("div");
overlay.id="devtools-block";

overlay.style=`
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
color:#fff;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:999999;
font-family:sans-serif;
text-align:center;
padding:40px
`;

overlay.innerHTML=`
<div style="font-size:60px"></div>
<h2 style="color:#ff4444;margin:10px 0">Akses Ditolak</h2>
<p style="opacity:.8">Developer Tools terdeteksi.<br>Tutup DevTools untuk melanjutkan.</p>
`;

document.body.appendChild(overlay);

// redirect otomatis
setTimeout(function(){
location.href="https://google.com";
},5000);

}

}else{

devtoolsOpen=false;

document.body.style.filter="";

let overlay=document.getElementById("devtools-block");
if(overlay) overlay.remove();

}

}

setInterval(detectDevTools,500);

// =======================
// DEBUGGER LOOP
// =======================
setInterval(function(){
debugger;
},100);

})();
</script>

<style>
:root{--p:#ff2d9a;--u:#8b5cff}
*{box-sizing:border-box}
body{
 margin:0;font-family:system-ui;
 background:#05050a;color:#fff
}
header{
 position:fixed;top:0;left:0;right:0;
 background:rgba(10,10,18,.75);
 backdrop-filter:blur(12px);
 padding:14px 20px;z-index:9;
 display:flex;justify-content:space-between
}
.logo{
 font-weight:900;
 background:linear-gradient(90deg,var(--p),var(--u));
 -webkit-background-clip:text;-webkit-text-fill-color:transparent
}
nav a{color:#fff;margin-left:16px;text-decoration:none}

main{padding:120px 20px 80px;max-width:900px;margin:auto}

h1{
 text-align:center;
 background:linear-gradient(90deg,var(--p),var(--u));
 -webkit-background-clip:text;-webkit-text-fill-color:transparent
}

.grid{
 display:grid;
 gap:20px;
 grid-template-columns:repeat(auto-fit,minmax(260px,1fr))
}
.card{
 background:#12121c;
 padding:22px;
 border-radius:22px;
 border:1px solid rgba(255,255,255,.08);
 box-shadow:0 0 14px rgba(255,45,154,.2);
 transition:.35s
}
.card:hover{
 box-shadow:
 0 0 20px rgba(255,0,150,.6),
 0 0 40px rgba(0,140,255,.6);
 transform:translateY(-6px)
}
.card b{color:#ff2d9a;font-size:15px}
.card p{font-size:14px;color:#ccc;margin:10px 0}

/* STAR */
.stars{color:#ffcc33;font-size:16px;letter-spacing:1px}

/* FOOTER */
footer{
 margin-top:80px;
 padding:50px 20px 30px;
 background:#0b0b14;
 text-align:center
}
.f-logo{
 font-weight:900;
 background:linear-gradient(90deg,var(--p),var(--u));
 -webkit-background-clip:text;-webkit-text-fill-color:transparent
}
footer small{color:#666;font-size:12px}

/* REVEAL */
.reveal{opacity:0;transform:translateY(40px);transition:1s}
.reveal.active{opacity:1;transform:none}
#testimoni {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}

/* Tablet */
@media (max-width: 900px) {
  #testimoni {
    grid-template-columns: repeat(2, 1fr);
  }
}

/* HP */
@media (max-width: 500px) {
  #testimoni {
    grid-template-columns: 1fr;
  }
}

/* CARD */
.card {
  background: #111;
  padding: 16px;
  border-radius: 12px;
  color: #fff;
}

/* REVEAL */
.reveal {
  opacity: 0;
  transform: translateY(30px);
  transition: all .6s ease;
}

.reveal.active {
  opacity: 1;
  transform: translateY(0);
}

.stars {
  color: gold;
  margin: 6px 0;
}

</style>
</head>

<body>

<header>
 <div class="logo">⚡ AHMAD STORE</div>
 <nav>
  <a href="index.html">Beranda</a>
  <a href="produk.html">Produk</a>
 </nav>
</header>

<main>
<h1 class="reveal">Apa Kata Mereka?</h1>
<div class="grid" id="testimoni"></div>
</main>

<footer class="reveal">
 <div class="f-logo">⚡ AHMAD STORE</div>
 <small>© 2026 Ahmad Store</small>
</footer>

<script>
// =====================
// DATA TESTIMONI
// =====================
const data = [
 {nama:"Andi", role:"Hosting Budged", rating:5, teks:"Server stabil, anti lag. Support cepat banget!"},
 {nama:"Rizky", role:"Bot Discord", rating:4, teks:"Bot online 24 jam tanpa crash. Mantap!"},
 {nama:"Fajar", role:"Hosting Premium", rating:5, teks:"Murah tapi kualitas premium, recommended."},
 {nama:"Dimas", role:"Hosting Ryzen", rating:4, teks:"Ping rendah dan jarang down."}
]

// =====================
// RENDER
// =====================
const grid = document.getElementById('testimoni')
const stars = n => "★".repeat(n) + "☆".repeat(5-n)

grid.innerHTML = data.map(t => `
  <div class="card reveal">
    <b>${t.nama} — ${t.role}</b>
    <div class="stars">${stars(t.rating)}</div>
    <p>${t.teks}</p>
  </div>
`).join('')

// =====================
// REVEAL ANIMATION (SINGLE OBSERVER)
// =====================
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('active')
      observer.unobserve(entry.target)
    }
  })
}, { threshold: 0.15 })

document.querySelectorAll('.reveal').forEach(el => observer.observe(el))
</script>

</body>
</html>
